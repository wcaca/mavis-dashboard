<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Mavis Dashboard Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  h1 { color: #60a5fa; margin: 0 0 8px; font-size: 24px; text-align: center; }
  .subtitle { color: #94a3b8; text-align: center; margin-bottom: 32px; font-size: 14px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; color: #cbd5e1; margin-bottom: 8px; font-size: 14px; }
  input {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 16px;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: #60a5fa; }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: #7f1d1d;
    color: #fecaca;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 14px;
    display: none;
  }
  .footer { text-align: center; color: #64748b; font-size: 12px; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Mavis Dashboard</h1>
  <div class="subtitle">请登录以查看实时状态</div>

  <div class="error" id="error"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" id="submitBtn">登录</button>
  </form>

  <div class="footer">
    凭据存于 <code>wcaca/vault</code> 加密仓库
  </div>
</div>

<script>
const form = document.getElementById('loginForm');
const error = document.getElementById('error');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  error.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = '登录中...';

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });

    const data = await resp.json();

    if (data.success) {
      // 设置 cookie 并跳转
      document.cookie = `mavis_session=${data.session_id}; Path=/; Max-Age=${7*24*3600}; SameSite=Strict`;
      window.location.href = '/';
    } else {
      throw new Error(data.error || '登录失败');
    }
  } catch (e) {
    error.textContent = '❌ ' + (e.message || '登录失败');
    error.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = '登录';
  }
});
</script>
</body>
</html>
